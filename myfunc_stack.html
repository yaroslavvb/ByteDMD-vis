<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>myfunc — Two-Stack Manhattan Diamond</title>
    <meta name="description" content="Animated visualization of ByteDMD LRU stack dynamics for dot product computation on a Manhattan spatial computer">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <style>

            background: linear-gradient(135deg, #00e5ff 0%, #a78bfa 50%, #f472b6 100%);

            gap: 12px; margin-bottom: 24px;
            padding: 10px 20px;
            background: rgba(15,23,42,0.5);

            border-radius: 12px;
            backdrop-filter: blur(10px);

            background: rgba(15,23,42,0.7);

            font-family: 'JetBrains Mono', monospace;
            font-size: 0.82rem; cursor: pointer;

        .step-display {

        }
        .play-btn {

            border: 1px solid rgba(80,180,80,0.3);

        /* --- Side Table --- */
        .side-panel {
            width: 280px;
            background: rgba(10,15,30,0.7);
            border: 1px solid rgba(148,163,184,0.1);
            border-radius: 14px;

            display: flex; flex-direction: column;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }
        .side-title {
            font-size: 0.8rem; font-weight: 700;
            color: #7c3aed; text-transform: uppercase;

        }
        .stack-table {
            width: 100%; border-collapse: collapse;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
        }
        .stack-table th {
            color: #64748b; font-weight: 600; padding: 6px;
            border-bottom: 1px solid rgba(148,163,184,0.1);
            text-align: center; font-size: 0.7rem;
            text-transform: uppercase; letter-spacing: 0.3px;
        }
        .stack-table td {
            padding: 6px; text-align: center;
            border-bottom: 1px solid rgba(148,163,184,0.05);
            color: #94a3b8;
        }
        .stack-table tr.active-row td {
            color: #e2e8f0; font-weight: 600;

        }
        .stack-table tr.read-row td {

        .stack-table .var-chip {

        .stack-type-arg { color: #fbbf24 !important; font-weight: 600; }

        .formula-panel {
            margin-top: auto;
            padding-top: 16px;
            border-top: 1px solid rgba(148,163,184,0.08);

            border-radius: 8px; padding-bottom: 16px;

        .formula {

            font-size: 0.9rem; color: #e2e8f0;
        }
        .formula strong { color: #c084fc; font-size: 1rem; }

        /* --- Info Panel --- */
        .info-panel {
            background: rgba(10,15,30,0.7);
            border: 1px solid rgba(148,163,184,0.1);
            border-radius: 12px;
            padding: 16px 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }
        .info-label {
            font-size: 1rem; font-weight: 600;
            color: #c084fc; margin-bottom: 6px;
        }
        .info-desc {
            font-size: 0.85rem; color: #cbd5e1; line-height: 1.6;
        }
        .info-desc strong { color: #00e5ff; }
        .info-desc em { color: #fbbf24; font-style: normal; }
        .cost-line {
            margin-top: 12px; display: flex; gap: 16px; align-items: center;
            font-family: 'JetBrains Mono', monospace; font-size: 0.85rem;
        }
        .cost-badge {
            background: rgba(124,58,237,0.2);
            border: 1px solid rgba(124,58,237,0.35);
            border-radius: 5px; padding: 4px 12px; color: #c084fc;
            font-weight: 700; font-size: 0.95rem;
        }
        .cost-delta {
            color: #fb7185; font-weight: 700;
        }
    </style>
</head>
<body>
<div id="app">
    <header>
        <h1>Manhattan Diamond Model</h1>
        <div class="subtitle">Two-Stack Architecture Trace of myfunc(a, b, c, d, e)</div>
    </header>

    <div class="controls">
        <button class="step-btn" id="btn-start" onclick="goStart()" title="Reset (R)">⏮</button>
        <button class="step-btn" id="btn-prev" onclick="prevStep()" title="Previous (←)">◀</button>
        <span class="step-display" id="step-display">1 / 13</span>
        <button class="step-btn" id="btn-next" onclick="nextStep()" title="Next (→)">▶</button>
        <button class="step-btn" id="btn-end" onclick="goEnd()">⏭</button>
        <button class="play-btn" id="btn-play" onclick="togglePlay()" title="Play / Pause (Space)">▶</button>
    </div>

    <div class="main-row">
        <div class="viz-container" id="viz-container">
            <svg id="grid-svg"></svg>
            <div id="chips-layer"></div>
        </div>
        <div class="side-panel">
            <div class="side-title">Live Memory State</div>
            <table class="stack-table" id="stack-table">
                <thead><tr><th>Stack</th><th>Loc</th><th>Var</th><th>(x,y)</th><th>DMD</th></tr></thead>
                <tbody id="stack-tbody"></tbody>
            </table>
            <div class="formula-panel">
                <div class="formula" id="formula-text"></div>
            </div>
        </div>
    </div>

    <div class="info-panel" id="info-panel">
        <div class="info-label" id="info-label"></div>
        <div class="info-desc" id="info-desc"></div>

            <span class="cost-badge" id="cost-badge"></span>
            <span class="cost-delta" id="cost-delta"></span>
        </div>
    </div>
</div>

<script>
// ============================================================
// GEOMETRY — Manhattan Diamond (Two Stacks)
// ============================================================
const CELL = 55;
const NUM_SLOTS = 12;

let PROC_SX, PROC_SY;

function isqrtCeil(x) {
    if (x <= 0) return 0;
    return Math.floor(Math.sqrt(x - 1)) + 1;
}

function spiralGrid(absDepth) {
    if (absDepth <= 0) return [0, 0];
    const k = isqrtCeil(absDepth);
    const startI = (k - 1) * (k - 1) + 1;
    const idx = absDepth - startI;
    let x;
    if (k % 2 === 1) x = (k - 1) - idx;
    else x = -(k - 1) + idx;
    const y = k - Math.abs(x);
    return [x, y];
}

function toScreen(gx, gy) {
    return [PROC_SX - gx * CELL, PROC_SY - gy * CELL];
}

function depthScreen(d) {
    const isArg = d < 0;
    const absD = Math.abs(d);
    const [gx, gy] = spiralGrid(absD);
    // Arg Stack (-): Moves UP physically (upper half diamond). So we pass gy unmodified.
    // Geom Stack (+): Moves DOWN in Y screen coords. So we invert gy.
    if (isArg) return toScreen(gx, gy);
    return toScreen(gx, -gy);
}

// ============================================================
// VARIABLES
// ============================================================
const V = {
    a: { label: 'a',  bg: 'linear-gradient(135deg,#38bdf8,#0077b6)', shadow: 'rgba(56,189,248,0.3)', dot: '#38bdf8' },
    b: { label: 'b',  bg: 'linear-gradient(135deg,#38bdf8,#0077b6)', shadow: 'rgba(56,189,248,0.3)', dot: '#38bdf8' },
    c: { label: 'c',  bg: 'linear-gradient(135deg,#34d399,#059669)', shadow: 'rgba(52,211,153,0.3)', dot: '#34d399' },
    d: { label: 'd',  bg: 'linear-gradient(135deg,#34d399,#059669)', shadow: 'rgba(52,211,153,0.3)', dot: '#34d399' },
    e: { label: 'e',  bg: 'linear-gradient(135deg,#fbbf24,#d97706)', shadow: 'rgba(251,191,36,0.3)', dot: '#fbbf24' },
    p0: { label: 'p₀', bg: 'linear-gradient(135deg,#fb923c,#dc2626)', shadow: 'rgba(251,146,60,0.3)', dot: '#fb923c' },
    p1: { label: 'p₁', bg: 'linear-gradient(135deg,#fb923c,#dc2626)', shadow: 'rgba(251,146,60,0.3)', dot: '#fb923c' },
    p2: { label: 'p₂', bg: 'linear-gradient(135deg,#c084fc,#7c3aed)', shadow: 'rgba(192,132,252,0.3)', dot: '#c084fc' },
    z:  { label: 'z',  bg: 'linear-gradient(135deg,#ec4899,#be185d)', shadow: 'rgba(236,72,153,0.3)', dot: '#ec4899' },
};

// ============================================================
// STATES — Exact evaluation of myfunc(a,b,c,d,e)
// ============================================================
// Arg stack depths are represented as negative numbers e.g., -1 -> arg=1
// Geom stack depths are positive numbers e.g., 2 -> geom=2
const states = [
    {
        label: "Initial State",
        desc: "Arguments statically packed on the <strong>Argument Stack</strong> (top diamond). The first argument hits Depth 1.<br>Geometric Stack (bottom diamond) is empty.",
        vars: { a: -1, b: -2, c: -3, d: -4, e: -5 },
        reads: [], cost: 0, delta: 0,
    },
    {
        label: "Step 1A — Read a@arg=1, b@arg=2",
        desc: "First reads! Priced against their permanently fixed slots on the Argument Stack.<br>Cost: ⌈√1⌉ + ⌈√2⌉ = 1 + 2 = <strong>3</strong>.",
        vars: { a: -1, b: -2, c: -3, d: -4, e: -5 },
        reads: [{id: 'a', depth: -1}, {id: 'b', depth: -2}], cost: 3, delta: 3,
    },
    {
        label: "Step 1B — Pull into PE",
        desc: "Values flow securely into the ALU.<br><em>Note: Since args are immutable, their slots do not compact when promoted!</em>",
        vars: { a: 'proc', b: 'proc', c: -3, d: -4, e: -5 },
        reads: [{id: 'a', depth: -1}, {id: 'b', depth: -2}], cost: 3, delta: 0,
    },
    {
        label: "Step 1C — Store p₀ = a·b",
        desc: "Product <strong>p₀</strong> pushed to the <strong>Geometric Stack</strong> (bottom diamond) at depth 1.<br>Liveness immediately vaporizes traces of <em>a</em> and <em>b</em>.",
        vars: { c: -3, d: -4, e: -5, p0: 1 },
        reads: [], cost: 3, delta: 0,
    },
    {
        label: "Step 2A — Read c@arg=3, d@arg=4",
        desc: "First reads for <em>c</em> and <em>d</em> priced against Argument Stack.<br>Cost: ⌈√3⌉ + ⌈√4⌉ = 2 + 2 = <strong>4</strong>.",
        vars: { c: -3, d: -4, e: -5, p0: 1 },
        reads: [{id: 'c', depth: -3}, {id: 'd', depth: -4}], cost: 7, delta: 4,
    },
    {
        label: "Step 2B — Pull into PE",
        desc: "Values flow into ALU.",
        vars: { c: 'proc', d: 'proc', e: -5, p0: 1 },
        reads: [{id: 'c', depth: -3}, {id: 'd', depth: -4}], cost: 7, delta: 0,
    },
    {
        label: "Step 2C — Store p₁ = c·d",
        desc: "Product <strong>p₁</strong> pushed to Geom stack top. <strong>p₀</strong> slides out to Depth 2.",
        vars: { e: -5, p1: 1, p0: 2 },
        reads: [], cost: 7, delta: 0,
    },
    {
        label: "Step 3A — Read p₀@geom=2, p₁@geom=1",
        desc: "Both values evaluated simultaneously against the Geometric stack.<br>Cost: ⌈√2⌉ + ⌈√1⌉ = 2 + 1 = <strong>3</strong>.",
        vars: { e: -5, p1: 1, p0: 2 },
        reads: [{id: 'p0', depth: 2}, {id: 'p1', depth: 1}], cost: 10, delta: 3,
    },
    {
        label: "Step 3B — Vaporize & Pull into PE",
        desc: "Notice both <em>p₀</em> and <em>p₁</em> are permanently vaporized. The active working set clamps optimally.",
        vars: { e: -5, p1: 'proc', p0: 'proc' },
        reads: [{id: 'p0', depth: 2}, {id: 'p1', depth: 1}], cost: 10, delta: 0,
    },
    {
        label: "Step 3C — Store p₂ = p₀ + p₁",
        desc: "Sum <strong>p₂</strong> pushed to Geom stack at depth 1.",
        vars: { e: -5, p2: 1 },
        reads: [], cost: 10, delta: 0,
    },
    {
        label: "Step 4A — Mixed Read: p₂@geom=1, e@arg=5",
        desc: "A mixed read freely cross-references both stacks! <em>p₂</em> is Geom=1, while <em>e</em> is Arg=5.<br>Cost: ⌈√1⌉ + ⌈√5⌉ = 1 + 3 = <strong>4</strong>.",
        vars: { e: -5, p2: 1 },
        reads: [{id: 'p2', depth: 1}, {id: 'e', depth: -5}], cost: 14, delta: 4,
    },
    {
        label: "Step 4B — Pull into PE",
        desc: "Final flow into the ALU.",
        vars: { e: 'proc', p2: 'proc' },
        reads: [{id: 'p2', depth: 1}, {id: 'e', depth: -5}], cost: 14, delta: 0,
    },
    {
        label: "Final — Output z",
        desc: "Execution finishes! Total ByteDMD routing distance for `myfunc` = <strong>14</strong>.",
        vars: { z: 1 },
        reads: [], cost: 14, delta: 0,
    }
];

// ============================================================
// SVG BUILDER
// ============================================================
function buildSVG() {
    const svg = document.getElementById('grid-svg');
    const rect = document.getElementById('viz-container').getBoundingClientRect();
    const W = rect.width, H = rect.height;
    svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

    PROC_SX = W / 2;
    PROC_SY = H / 2;

    let s = '';

    // Defs
    s += `<defs>
        <marker id="arr" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
            <polygon points="0 0, 7 2.5, 0 5" fill="rgba(148,163,184,0.25)"/>
        </marker>
    </defs>`;

    // Subtle grid background lines
    for (let gx = -4; gx <= 4; gx++) {
        const [sx] = toScreen(gx, 0);
        s += `<line x1="${sx}" y1="${PROC_SY - 4.5 * CELL}" x2="${sx}" y2="${PROC_SY + 4.5 * CELL}" stroke="rgba(148,163,184,0.03)" stroke-width="1"/>`;
    }
    for (let gy = -4; gy <= 4; gy++) {
        const [, sy] = toScreen(0, gy);
        s += `<line x1="${PROC_SX - 4 * CELL - 10}" y1="${sy}" x2="${PROC_SX + 4 * CELL + 10}" y2="${sy}" stroke="rgba(148,163,184,0.03)" stroke-width="1"/>`;
    }

    // Manhattan Distance Rings (Full Diamond)
    const ringStyles = [
        '',
        { color: 'rgba(139,92,246,0.3)', label: 'R1' },
        { color: 'rgba(236,72,153,0.25)', label: 'R2' },
        { color: 'rgba(56,189,248,0.2)', label: 'R3' },
    ];

    for (let ring = 1; ring <= 3; ring++) {
        let pts = [];
        // Top half
        for (let dx = -ring; dx <= ring; dx++) pts.push(toScreen(dx, ring - Math.abs(dx)));
        // Bottom half
        for (let dx = ring - 1; dx >= -ring + 1; dx--) pts.push(toScreen(dx, -(ring - Math.abs(dx))));
        
        const d_path = pts.map((p, i) => (i === 0 ? 'M' : 'L') + p[0] + ',' + p[1]).join(' ') + ' Z';
        s += `<path d="${d_path}" fill="rgba(255,255,255,0.005)" stroke="${ringStyles[ring].color}" stroke-width="1.5" stroke-dasharray="6,4"/>`;
    }

    // Stack arena labels
    s += `<text x="${PROC_SX - 120}" y="${PROC_SY - 180}" text-anchor="middle" fill="rgba(251,191,36,0.4)" font-family="JetBrains Mono" font-size="12" font-weight="700">ARGUMENT STACK</text>`;
    s += `<text x="${PROC_SX - 120}" y="${PROC_SY + 190}" text-anchor="middle" fill="rgba(56,189,248,0.4)" font-family="JetBrains Mono" font-size="12" font-weight="700">GEOMETRIC STACK</text>`;

    // Spiral arrows for Geom stack
    for (let d = 1; d < NUM_SLOTS; d++) {
        const [x1, y1] = depthScreen(d);
        const [x2, y2] = depthScreen(d + 1);
        const dx = x2 - x1, dy = y2 - y1;
        const len = Math.sqrt(dx * dx + dy * dy);
        const shr = 22; 
        s += `<line x1="${x1 + dx/len*shr}" y1="${y1 + dy/len*shr}" x2="${x2 - dx/len*shr}" y2="${y2 - dy/len*shr}" stroke="rgba(148,163,184,0.12)" stroke-width="1.5" marker-end="url(#arr)"/>`;
    }
    
    // Line from generic center directly to depth 1
    const [x2, y2] = depthScreen(1);
    const len = Math.sqrt((x2 - PROC_SX)**2 + (y2 - PROC_SY)**2);
    s += `<line x1="${PROC_SX + (x2-PROC_SX)/len*24}" y1="${PROC_SY + (y2-PROC_SY)/len*24}" x2="${x2 - (x2-PROC_SX)/len*24}" y2="${y2 - (y2-PROC_SY)/len*24}" stroke="rgba(148,163,184,0.12)" stroke-width="1.5" marker-end="url(#arr)"/>`;

    // Depth Slot Circles (Top: Geom, Bottom: Arg)
    for (let d = 1; d <= NUM_SLOTS; d++) {
        // Geom
        let [sx, sy] = depthScreen(d);
        s += `<circle cx="${sx}" cy="${sy}" r="22" fill="rgba(56,189,248,0.02)" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.3" id="slot-${d}"/>`;
        s += `<text x="${sx}" y="${sy + 36}" text-anchor="middle" fill="#38bdf8" font-family="JetBrains Mono" font-size="10" font-weight="600" opacity="0.5">gm=${d}</text>`;

        // Arg
        let [ax, ay] = depthScreen(-d);
        if (d <= 5) {
            s += `<circle cx="${ax}" cy="${ay}" r="22" fill="rgba(251,191,36,0.02)" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.3" id="slot--${d}"/>`;
        }
        s += `<text x="${ax}" y="${ay - 28}" text-anchor="middle" fill="#fbbf24" font-family="JetBrains Mono" font-size="10" font-weight="600" opacity="${d<=5? 0.5 : 0.15}">ar=${d}</text>`;
    }

    // Processor diamond (ALU)
    s += `<g>
        <rect x="${PROC_SX - 20}" y="${PROC_SY - 20}" width="40" height="40" rx="8"
              fill="rgba(5,10,25,0.95)" stroke="#c084fc" stroke-width="2"
              transform="rotate(45 ${PROC_SX} ${PROC_SY})"/>
        <text x="${PROC_SX}" y="${PROC_SY + 5}" text-anchor="middle" fill="#f8fafc"
              font-family="JetBrains Mono" font-weight="700" font-size="14">ALU</text>
    </g>`;

    s += `<g id="cost-paths"></g>`;
    svg.innerHTML = s;
}

// ============================================================
// RENDERER
// ============================================================
const chipEls = {};
function buildChips() {
    const layer = document.getElementById('chips-layer');
    layer.innerHTML = '';
    Object.entries(V).forEach(([id, def]) => {
        const chip = document.createElement('div');
        chip.className = 'chip hidden';
        chip.style.background = def.bg;
        chip.style.boxShadow = `0 4px 14px ${def.shadow}`;
        chip.innerHTML = def.label;
        chip.style.left = PROC_SX + 'px';
        chip.style.top = PROC_SY + 'px';
        layer.appendChild(chip);
        chipEls[id] = chip;
    });
}

let currentState = 0;

function renderState() {
    const st = states[currentState];

    // --- Process Chips ---
    Object.keys(V).forEach(id => {
        const chip = chipEls[id];
        const pos = st.vars[id];

        if (pos === undefined) {
            chip.style.opacity = '0';
            chip.style.transform = 'translate(-50%, -50%) scale(0.5)';
        } else if (pos === 'proc') {
            chip.style.left = PROC_SX + 'px';
            chip.style.top = PROC_SY + 'px';
            chip.style.opacity = '0.85';
            chip.style.width = '36px'; chip.style.height = '36px';
            chip.style.fontSize = '0.75rem';
            chip.style.transform = 'translate(-50%, -50%) scale(1)';
            chip.style.boxShadow = `0 0 20px ${V[id].shadow}`;
        } else {
            const [sx, sy] = depthScreen(pos);
            chip.style.left = sx + 'px';
            chip.style.top = sy + 'px';
            chip.style.opacity = '1';
            chip.style.width = '44px'; chip.style.height = '44px';
            chip.style.fontSize = '0.9rem';
            
            const isHighlighted = st.label.includes('Read') && st.reads.some(r => r.id === id);
            if (isHighlighted) {
                chip.style.boxShadow = `0 0 0 3px #fb7185, 0 8px 24px ${V[id].shadow}`;
                chip.style.transform = 'translate(-50%, -50%) scale(1.15)';
                chip.style.zIndex = '10';
            } else {
                chip.style.boxShadow = `0 4px 14px ${V[id].shadow}`;
                chip.style.transform = 'translate(-50%, -50%) scale(1)';
                chip.style.zIndex = '1';
            }
        }
    });

    // --- Red Cost Paths ---
    const cp = document.getElementById('cost-paths');
    let pathHTML = '';
    st.reads.forEach(r => {
        const absD = Math.abs(r.depth);
        const [gx, gy] = spiralGrid(absD);
        const [tx, ty] = depthScreen(r.depth);
        // Midpoint Y explicitly maps up/down correctly
        const [, midY] = r.depth < 0 ? toScreen(0, gy) : toScreen(0, -gy);
        
        pathHTML += `<path d="M ${PROC_SX} ${PROC_SY} L ${PROC_SX} ${midY} L ${tx} ${ty}" fill="none" stroke="rgba(251,113,133,0.5)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>`;
        
        const cost = isqrtCeil(absD);
        const onRight = tx >= PROC_SX;
        const lx = tx + (onRight ? 18 : -18);
        const anchor = onRight ? 'start' : 'end';
        pathHTML += `<text x="${lx}" y="${ty - 12}" text-anchor="${anchor}" fill="#fca5a5" font-family="JetBrains Mono" font-size="10" font-weight="700">cost=${cost}</text>`;
    });
    cp.innerHTML = pathHTML;

    // --- Side Table ---
    const tbody = document.getElementById('stack-tbody');
    const allEntries = [
        ...Object.entries(st.vars).filter(([, v]) => typeof v === 'number').map(([id, d]) => ({ id, depth: d, type: 'stack' })),
        ...st.reads.map(r => ({ id: r.id, depth: r.depth, type: 'read' }))
    ].sort((a, b) => b.depth - a.depth); // sort args (-), then geom (+)

    let rows = '';
    allEntries.forEach(e => {
        const [gx, gyRaw] = spiralGrid(Math.abs(e.depth));
        const cost = isqrtCeil(Math.abs(e.depth));
        const sType = e.depth < 0 ? '<span class="stack-type-arg">Arg</span>' : '<span class="stack-type-geom">Geom</span>';
        const ySign = e.depth < 0 ? '-' : '+';
        const dVal = Math.abs(e.depth);
        const cls = e.type === 'read' ? 'read-row' : 'active-row';
        const def = V[e.id];
        
        rows += `<tr class="${cls}">
            <td>${sType}</td>
            <td>= ${dVal}</td>
            <td><span class="var-chip" style="background:${def.dot}"></span>${def.label}</td>
            <td>(${gx > 0 ? '+'+gx : gx}, ${ySign}${gyRaw})</td>
            <td>${cost}</td>
        </tr>`;
    });
    tbody.innerHTML = rows;

    // --- Formula ---
    const formulaEl = document.getElementById('formula-text');
    if (currentState === 0)       formulaEl.innerHTML = '<strong>myfunc</strong>(a, b, c, d, e)';
    else if (currentState <= 3)   formulaEl.innerHTML = '<strong>p₀</strong> = a · b';
    else if (currentState <= 6)   formulaEl.innerHTML = '<strong>p₁</strong> = c · d';
    else if (currentState <= 9)   formulaEl.innerHTML = '<strong>p₂</strong> = p₀ + p₁';
    else                          formulaEl.innerHTML = '<strong>z</strong> = p₂ + e';

    // --- Telemetry ---
    document.getElementById('info-label').textContent = st.label;
    document.getElementById('info-desc').innerHTML = st.desc;
    document.getElementById('cost-badge').textContent = `Total cost: ${st.cost}`;
    document.getElementById('cost-delta').textContent = st.delta > 0 ? `(+${st.delta} cost added)` : '';

    // --- UI State ---
    document.getElementById('step-display').textContent = `${currentState + 1} / ${states.length}`;
    document.getElementById('btn-prev').disabled = currentState <= 0;
    document.getElementById('btn-next').disabled = currentState >= states.length - 1;
    document.getElementById('btn-start').disabled = currentState <= 0;
    document.getElementById('btn-end').disabled = currentState >= states.length - 1;
}

// ============================================================
// PLAYBACK
// ============================================================
let playing = false;
let playInterval = null;

function togglePlay() { if (playing) stopPlay(); else play(); }
function play() {
    if (currentState >= states.length - 1) return;
    playing = true;
    document.getElementById('btn-play').textContent = '⏸';
    document.getElementById('btn-play').classList.add('playing');
    playInterval = setInterval(() => {
        if (currentState < states.length - 1) nextStep();
        else stopPlay();
    }, 1800);
}
function stopPlay() {
    playing = false;
    clearInterval(playInterval);
    document.getElementById('btn-play').textContent = '▶';
    document.getElementById('btn-play').classList.remove('playing');
}

function nextStep() { if (currentState < states.length - 1) { currentState++; renderState(); } }
function prevStep() { if (currentState > 0) { currentState--; renderState(); } }
function goStart() { currentState = 0; renderState(); stopPlay(); }
function goEnd() { currentState = states.length - 1; renderState(); stopPlay(); }

document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight') { e.preventDefault(); stopPlay(); nextStep(); }
    else if (e.key === 'ArrowLeft') { e.preventDefault(); stopPlay(); prevStep(); }
    else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
    else if (e.key === 'r' || e.key === 'R') { goStart(); }
});

// Setup
buildSVG();
buildChips();
renderState();
</script>
</body>
</html>
