<div id="app">

<script>
// ============================================================
// GEOMETRY — Upper-half spiral from manhattan_figure.py
// ============================================================
const CELL = 60;
const NUM_SLOTS = 9;

// Processor screen coords (center of viz, near top)
let PROC_SX, PROC_SY;

function isqrtCeil(x) {
    if (x <= 0) return 0;
    return Math.floor(Math.sqrt(x - 1)) + 1;   // matches Python isqrt(x-1)+1
}

function spiralGrid(depth) {
    // Returns [gx, gy] grid coords — exact match of upper_half_spiral()
    if (depth <= 0) return [0, 0];
    const k = isqrtCeil(depth);
    const startI = (k - 1) * (k - 1) + 1;
    const idx = depth - startI;
    let x;
    if (k % 2 === 1) x = (k - 1) - idx;
    else x = -(k - 1) + idx;
    const y = k - Math.abs(x);
    return [x, y];
}

function toScreen(gx, gy) {
    // Flipped: processor at top, stack grows downward; mirrored left-right
    return [PROC_SX - gx * CELL, PROC_SY + gy * CELL];
}

function depthScreen(d) {
    const [gx, gy] = spiralGrid(d);
    return toScreen(gx, gy);
}

// ============================================================
// VARIABLE DEFINITIONS
// ============================================================
const V = {
    x0:   { label: 'x₀',   bg: 'linear-gradient(135deg,#38bdf8,#0077b6)', shadow: 'rgba(56,189,248,0.35)',  dot: '#38bdf8' },
    x1:   { label: 'x₁',   bg: 'linear-gradient(135deg,#38bdf8,#0077b6)', shadow: 'rgba(56,189,248,0.35)',  dot: '#38bdf8' },
    x2:   { label: 'x₂',   bg: 'linear-gradient(135deg,#38bdf8,#0077b6)', shadow: 'rgba(56,189,248,0.35)',  dot: '#38bdf8' },
    x3:   { label: 'x₃',   bg: 'linear-gradient(135deg,#38bdf8,#0077b6)', shadow: 'rgba(56,189,248,0.35)',  dot: '#38bdf8' },
    y0:   { label: 'y₀',   bg: 'linear-gradient(135deg,#34d399,#059669)', shadow: 'rgba(52,211,153,0.35)',  dot: '#34d399' },
    y1:   { label: 'y₁',   bg: 'linear-gradient(135deg,#34d399,#059669)', shadow: 'rgba(52,211,153,0.35)',  dot: '#34d399' },
    y2:   { label: 'y₂',   bg: 'linear-gradient(135deg,#34d399,#059669)', shadow: 'rgba(52,211,153,0.35)',  dot: '#34d399' },
    y3:   { label: 'y₃',   bg: 'linear-gradient(135deg,#34d399,#059669)', shadow: 'rgba(52,211,153,0.35)',  dot: '#34d399' },
    m0:   { label: 'm₀',   bg: 'linear-gradient(135deg,#fb923c,#dc2626)', shadow: 'rgba(251,146,60,0.35)',  dot: '#fb923c' },
    m1:   { label: 'm₁',   bg: 'linear-gradient(135deg,#fb923c,#dc2626)', shadow: 'rgba(251,146,60,0.35)',  dot: '#fb923c' },
    m2:   { label: 'm₂',   bg: 'linear-gradient(135deg,#fb923c,#dc2626)', shadow: 'rgba(251,146,60,0.35)',  dot: '#fb923c' },
    m3:   { label: 'm₃',   bg: 'linear-gradient(135deg,#fb923c,#dc2626)', shadow: 'rgba(251,146,60,0.35)',  dot: '#fb923c' },
    s01:  { label: 's₀₁',  bg: 'linear-gradient(135deg,#c084fc,#7c3aed)', shadow: 'rgba(192,132,252,0.35)', dot: '#c084fc' },
    s012: { label: 's₀₁₂', bg: 'linear-gradient(135deg,#c084fc,#7c3aed)', shadow: 'rgba(192,132,252,0.35)', dot: '#c084fc' },
    z:    { label: 'z',     bg: 'linear-gradient(135deg,#a855f7,#ec4899)', shadow: 'rgba(168,85,247,0.35)',  dot: '#a855f7' },

// ============================================================

//   vars: depth (number) | 'proc' | undefined (hidden)
// ============================================================
const states = [
    {
        label: "Initial State",

    {
        label: "Step 7A — Highlight s₀₁₂, m₃",
        desc: "Identify s₀₁₂ at depth 2 (cost = ⌈√2⌉ = <strong>2</strong>) and m₃ at depth 1 (cost = ⌈√1⌉ = <strong>1</strong>).<br>Cost paths shown in red.",
        vars: { s012: 2, m3: 1 },
        reads: [{ id: 's012', depth: 2 }, { id: 'm3', depth: 1 }],
        cost: 28, delta: 3,
    },
    {
        label: "Step 7B — Pull into PE",
        desc: "Variables pulled into processor.<br>Dead variables <em>vaporized</em>. Survivors slide.",
        vars: { s012: 'proc', m3: 'proc' },
        reads: [{ id: 's012', depth: 2 }, { id: 'm3', depth: 1 }],
        cost: 28, delta: 0,
    },
    {
        label: "Final — Store z = x₀y₀ + x₁y₁ + x₂y₂ + x₃y₃",
        desc: "Dot product result <strong>z</strong> stored at depth 1.<br>Total ByteDMD cost = <strong>28</strong> — the sum of Manhattan distances over all reads.",
        vars: { z: 1 },
        reads: [],
        cost: 28, delta: 0,
    },
];

// ============================================================
// BUILD SVG
// ============================================================
function buildSVG() {
    const svg = document.getElementById('grid-svg');
    const rect = document.getElementById('viz-container').getBoundingClientRect();
    const W = rect.width, H = rect.height;
    svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

    PROC_SX = W / 2;
    PROC_SY = 60;

    let s = '';

    // Defs
    s += `<defs>
        <marker id="arr" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
            <polygon points="0 0, 7 2.5, 0 5" fill="rgba(148,163,184,0.25)"/>
        </marker>
        <marker id="arr-red" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
            <polygon points="0 0, 7 2.5, 0 5" fill="rgba(251,113,133,0.6)"/>
        </marker>
    </defs>`;

    // Subtle grid lines
    for (let gx = -3; gx <= 3; gx++) {
        const [sx] = toScreen(gx, 0);
        s += `<line x1="${sx}" y1="${PROC_SY - 20}" x2="${sx}" y2="${PROC_SY + 3.5 * CELL + 10}" stroke="rgba(148,163,184,0.04)" stroke-width="1"/>`;
    }
    for (let gy = 0; gy <= 4; gy++) {
        const [, sy] = toScreen(0, gy);
        s += `<line x1="${PROC_SX - 3 * CELL - 10}" y1="${sy}" x2="${PROC_SX + 3 * CELL + 10}" y2="${sy}" stroke="rgba(148,163,184,0.04)" stroke-width="1"/>`;
    }

    // Manhattan distance rings (upper-half diamonds)
    const ringStyles = [
        '',
        { color: 'rgba(139,92,246,0.25)', label: 'Ring 1 — 1 slot', ly: -18 },
        { color: 'rgba(236,72,153,0.2)',  label: 'Ring 2 — 3 slots', ly: -18 },
        { color: 'rgba(251,191,36,0.15)', label: 'Ring 3 — 5 slots', ly: -18 },
    ];
    for (let ring = 1; ring <= 3; ring++) {
        const pts = [];
        for (let dx = -ring; dx <= ring; dx++) {
            const dy = ring - Math.abs(dx);
            if (dy >= 1) pts.push(toScreen(dx, dy));
        }
        // Add the outer base corners at y=0 for a complete visual arc
        pts.unshift(toScreen(-ring, 0));
        pts.push(toScreen(ring, 0));
        const d = pts.map((p, i) => (i === 0 ? 'M' : 'L') + p[0] + ',' + p[1]).join(' ');
        s += `<path d="${d}" fill="none" stroke="${ringStyles[ring].color}" stroke-width="1.5" stroke-dasharray="6,4"/>`;
        // Ring label on the right side of screen (negate grid x for mirror)
        const labelPt = toScreen(-(ring + 0.15), 0.3);
        s += `<text x="${labelPt[0]}" y="${labelPt[1]}" fill="${ringStyles[ring].color}" font-family="Inter" font-size="9.5" font-weight="600" opacity="0.9">${ringStyles[ring].label}</text>`;
    }

    // Spiral path arrows (depth d → d+1)
    for (let d = 1; d < NUM_SLOTS; d++) {
        const [x1, y1] = depthScreen(d);
        const [x2, y2] = depthScreen(d + 1);
        // Shorten line so arrow doesn't overlap circle
        const dx = x2 - x1, dy = y2 - y1;
        const len = Math.sqrt(dx * dx + dy * dy);
        const shr = 22; // shrink from each end
        const sx1 = x1 + dx / len * shr, sy1 = y1 + dy / len * shr;
        const sx2 = x2 - dx / len * shr, sy2 = y2 - dy / len * shr;
        s += `<line x1="${sx1}" y1="${sy1}" x2="${sx2}" y2="${sy2}" stroke="rgba(148,163,184,0.12)" stroke-width="1.5" marker-end="url(#arr)"/>`;
    }
    // Arrow from processor to depth 1
    {
        const [x2, y2] = depthScreen(1);
        const dx = x2 - PROC_SX, dy = y2 - PROC_SY;
        const len = Math.sqrt(dx * dx + dy * dy);
        const shr = 24;
        s += `<line x1="${PROC_SX + dx / len * shr}" y1="${PROC_SY + dy / len * shr}" x2="${x2 - dx / len * shr}" y2="${y2 - dy / len * shr}" stroke="rgba(148,163,184,0.12)" stroke-width="1.5" marker-end="url(#arr)"/>`;
    }

    // Depth slot circles with labels
    const slotColor = d => {
        const r = isqrtCeil(d);
        if (r === 1) return '#8b5cf6';
        if (r === 2) return '#ec4899';
        return '#fbbf24';
    };
    for (let d = 1; d <= NUM_SLOTS; d++) {
        const [sx, sy] = depthScreen(d);
        const c = slotColor(d);
        s += `<circle cx="${sx}" cy="${sy}" r="24" fill="none" stroke="${c}" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.35" id="slot-${d}"/>`;
        // depth label below
        s += `<text x="${sx}" y="${sy + 35}" text-anchor="middle" fill="${c}" font-family="JetBrains Mono" font-size="10" font-weight="600" opacity="0.5">d=${d}</text>`;
    }

    // Processor diamond
    s += `<g>
        <rect x="${PROC_SX - 18}" y="${PROC_SY - 18}" width="36" height="36" rx="7"
              fill="rgba(20,10,40,0.85)" stroke="#e879a0" stroke-width="2.5"
              transform="rotate(45 ${PROC_SX} ${PROC_SY})"/>
        <text x="${PROC_SX}" y="${PROC_SY + 5}" text-anchor="middle" fill="white"
              font-family="JetBrains Mono" font-weight="700" font-size="13">PE</text>
    </g>`;

    // Dynamic cost-path layer
    s += `<g id="cost-paths"></g>`;

    svg.innerHTML = s;
}

// ============================================================
// BUILD CHIPS
// ============================================================
const chipEls = {};

function buildChips() {
    const layer = document.getElementById('chips-layer');
    layer.innerHTML = '';
    Object.entries(V).forEach(([id, def]) => {
        const chip = document.createElement('div');
        chip.className = 'chip hidden';
        chip.style.background = def.bg;
        chip.style.boxShadow = `0 4px 14px ${def.shadow}`;
        chip.innerHTML = def.label;
        chip.style.left = PROC_SX + 'px';
        chip.style.top = PROC_SY + 'px';
        layer.appendChild(chip);
        chipEls[id] = chip;
    });
}

// ============================================================
// RENDER
// ============================================================
let currentState = 0;

function renderState() {
    const st = states[currentState];

    // --- Chips ---
    Object.keys(V).forEach(id => {
        const chip = chipEls[id];
        const pos = st.vars[id];
        if (pos === undefined) {
            chip.style.left = PROC_SX + 'px';
            chip.style.top = PROC_SY + 'px';
            chip.style.opacity = '0';
            chip.style.boxShadow = `0 0 0 transparent`;
        } else if (pos === 'proc') {
            chip.style.left = PROC_SX + 'px';
            chip.style.top = PROC_SY + 'px';
            chip.style.opacity = '0.7';
            chip.style.width = '36px';
            chip.style.height = '36px';
            chip.style.fontSize = '0.7rem';
            chip.style.boxShadow = `0 0 18px ${V[id].shadow}`;
        } else {
            const [sx, sy] = depthScreen(pos);
            chip.style.left = sx + 'px';
            chip.style.top = sy + 'px';
            chip.style.opacity = '1';
            chip.style.width = '44px';
            chip.style.height = '44px';
            chip.style.fontSize = '0.8rem';
            
            const isHighlighted = st.label.includes('Highlight') && st.reads.some(r => r.id === id);
            if (isHighlighted) {
                chip.style.boxShadow = `0 0 0 3px #fb7185, 0 8px 20px ${V[id].shadow}`;
                chip.style.transform = 'translate(-50%, -50%) scale(1.15)';
                chip.style.zIndex = '10';
            } else {
                chip.style.boxShadow = `0 4px 14px ${V[id].shadow}`;
                chip.style.transform = 'translate(-50%, -50%) scale(1)';
                chip.style.zIndex = '1';
            }
        }
    });

    // --- Cost paths (red L-shapes) ---
    const cp = document.getElementById('cost-paths');
    let pathHTML = '';
    st.reads.forEach(r => {
        const [gx, gy] = spiralGrid(r.depth);
        const [tx, ty] = toScreen(gx, gy);
        const [, midY] = toScreen(0, gy);
        // L-shaped path: (0,0) → (0, gy) → (gx, gy) — vertical then horizontal
        pathHTML += `<path d="M ${PROC_SX} ${PROC_SY} L ${PROC_SX} ${midY} L ${tx} ${ty}" fill="none" stroke="rgba(251,113,133,0.45)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>`;
        // Cost label (use screen-space logic for positioning)
        const cost = isqrtCeil(r.depth);
        const onRight = tx >= PROC_SX;
        const lx = tx + (onRight ? 16 : -16);
        const anchor = onRight ? 'start' : 'end';
        pathHTML += `<text x="${lx}" y="${ty - 10}" text-anchor="${anchor}" fill="#fb7185" font-family="JetBrains Mono" font-size="9" font-weight="700">cost=${cost}</text>`;
    });
    cp.innerHTML = pathHTML;

    // --- Highlight accessed slots ---
    for (let d = 1; d <= NUM_SLOTS; d++) {
        const el = document.getElementById('slot-' + d);
        if (!el) continue;
        const isRead = st.reads.some(r => r.depth === d);
        el.setAttribute('opacity', isRead ? '0.8' : '0.35');
        el.setAttribute('stroke-width', isRead ? '2.5' : '1.5');
    }

    // --- Side table ---
    const tbody = document.getElementById('stack-tbody');
    // Collect stack entries sorted by depth
    const stackEntries = Object.entries(st.vars)
        .filter(([, v]) => typeof v === 'number')
        .map(([id, d]) => ({ id, depth: d }))
        .sort((a, b) => a.depth - b.depth);
    // Also include read entries
    const readIds = new Set(st.reads.map(r => r.id));

    let rows = '';
    // Show occupied + read depths
    const allEntries = [
        ...stackEntries.map(e => ({ ...e, type: 'stack' })),
        ...st.reads.map(r => ({ id: r.id, depth: r.depth, type: 'read' }))
    ].sort((a, b) => a.depth - b.depth);

    allEntries.forEach(e => {
        const [gx, gy] = spiralGrid(e.depth);
        const cost = isqrtCeil(e.depth);
        const cls = e.type === 'read' ? 'read-row' : 'active-row';
        const def = V[e.id];
        rows += `<tr class="${cls}">
            <td>${e.depth}</td>
            <td><span class="var-chip" style="background:${def.dot}"></span>${def.label}</td>
            <td>(${gx >= 0 ? '+' : ''}${gx}, ${gy})</td>
            <td>${cost}</td>
        </tr>`;
    });
    if (allEntries.length === 0) {
        rows = `<tr><td colspan="4" style="color:#334155; font-style:italic; padding:12px">empty</td></tr>`;
    }
    tbody.innerHTML = rows;

    // --- Formula ---
    const formulaEl = document.getElementById('formula-text');
    if (currentState === 0)        formulaEl.innerHTML = '<strong>z</strong> = x₀·y₀ + x₁·y₁ + x₂·y₂ + x₃·y₃';
    else if (currentState <= 3)    formulaEl.innerHTML = '<strong>m₀</strong> = x₀ · y₀';
    else if (currentState <= 6)    formulaEl.innerHTML = '<strong>m₁</strong> = x₁ · y₁';
    else if (currentState <= 9)    formulaEl.innerHTML = '<strong>s₀₁</strong> = m₀ + m₁';
    else if (currentState <= 12)   formulaEl.innerHTML = '<strong>m₂</strong> = x₂ · y₂';
    else if (currentState <= 15)   formulaEl.innerHTML = '<strong>s₀₁₂</strong> = s₀₁ + m₂';
    else if (currentState <= 18)   formulaEl.innerHTML = '<strong>m₃</strong> = x₃ · y₃';
    else                           formulaEl.innerHTML = '<strong>z</strong> = s₀₁₂ + m₃';

    // --- Info panel ---
    document.getElementById('info-label').textContent = st.label;
    document.getElementById('info-desc').innerHTML = st.desc;
    document.getElementById('cost-badge').textContent = `Total cost: ${st.cost}`;
    document.getElementById('cost-delta').textContent = st.delta > 0 ? `(+${st.delta} this step)` : '';

    // --- Controls ---
    document.getElementById('step-display').textContent = `${currentState + 1} / ${states.length}`;
    document.getElementById('btn-prev').disabled = currentState <= 0;
    document.getElementById('btn-next').disabled = currentState >= states.length - 1;
    document.getElementById('btn-start').disabled = currentState <= 0;
    document.getElementById('btn-end').disabled = currentState >= states.length - 1;
}

// ============================================================
// CONTROLS
// ============================================================
function nextStep() { if (currentState < states.length - 1) { currentState++; renderState(); } }
function prevStep() { if (currentState > 0) { currentState--; renderState(); } }
function goStart() { currentState = 0; renderState(); stopPlay(); }
function goEnd() { currentState = states.length - 1; renderState(); stopPlay(); }

let playing = false, playTimer = null;
function togglePlay() {
    if (playing) stopPlay();
    else {
        playing = true;
        document.getElementById('btn-play').textContent = '⏸';
        document.getElementById('btn-play').classList.add('playing');
        playTimer = setInterval(() => {
            if (currentState < states.length - 1) { currentState++; renderState(); }
            else stopPlay();
        }, 1200);
    }
}
function stopPlay() {
    playing = false;
    if (playTimer) { clearInterval(playTimer); playTimer = null; }
    const btn = document.getElementById('btn-play');
    if (btn) { btn.textContent = '▶'; btn.classList.remove('playing'); }
}

document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    switch (e.key) {
        case 'ArrowRight': e.preventDefault(); nextStep(); break;
        case 'ArrowLeft':  e.preventDefault(); prevStep(); break;
        case ' ':          e.preventDefault(); togglePlay(); break;
        case 'r': case 'R': goStart(); break;
    }
});

// ============================================================
// BOOT
// ============================================================
window.addEventListener('DOMContentLoaded', () => {
    buildSVG();
    buildChips();
    renderState();
});

// Rebuild on resize
window.addEventListener('resize', () => {
    buildSVG();
    // Re-position chips immediately (no transition)
    Object.values(chipEls).forEach(c => c.style.transition = 'none');
    renderState();
    requestAnimationFrame(() => {
        Object.values(chipEls).forEach(c => c.style.transition = '');
    });
});
</script>
</body>
</html>
